<!DOCTYPE html>
<html><head><title>gen</title></head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

function drawIcon(size) {
  c.width = size; c.height = size;
  const r = size * 0.2;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(size-r,0);
  ctx.quadraticCurveTo(size,0,size,r);
  ctx.lineTo(size,size-r);
  ctx.quadraticCurveTo(size,size,size-r,size);
  ctx.lineTo(r,size);
  ctx.quadraticCurveTo(0,size,0,size-r);
  ctx.lineTo(0,r);
  ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();
  const g = ctx.createLinearGradient(0,0,size,size);
  g.addColorStop(0,"#6C63FF"); g.addColorStop(1,"#8B85FF");
  ctx.fillStyle = g; ctx.fill();
  ctx.fillStyle = "white";
  ctx.font = `bold ${size*0.47}px sans-serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("敬", size/2, size/2+size*0.03);
}

function dl(name) {
  const a = document.createElement("a");
  a.download = name;
  a.href = c.toDataURL("image/png");
  a.click();
}

async function run() {
  // Icons
  for (const [size, name] of [[180,"icon-180.png"],[192,"icon-192.png"],[512,"icon-512.png"],[48,"favicon.png"]]) {
    drawIcon(size);
    dl(name);
    await new Promise(r => setTimeout(r, 500));
  }

  // OGP
  const w=1200, h=630;
  c.width=w; c.height=h;
  const gr = ctx.createLinearGradient(0,0,w,h);
  gr.addColorStop(0,"#6C63FF"); gr.addColorStop(1,"#8B85FF");
  ctx.fillStyle=gr; ctx.fillRect(0,0,w,h);
  ctx.globalAlpha=0.08; ctx.fillStyle="white";
  ctx.beginPath(); ctx.arc(200,500,200,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(1000,130,150,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle="rgba(255,255,255,0.2)";
  const is=120,ix=w/2-60,iy=120,ir2=is*0.22;
  ctx.beginPath();
  ctx.moveTo(ix+ir2,iy);ctx.lineTo(ix+is-ir2,iy);ctx.quadraticCurveTo(ix+is,iy,ix+is,iy+ir2);
  ctx.lineTo(ix+is,iy+is-ir2);ctx.quadraticCurveTo(ix+is,iy+is,ix+is-ir2,iy+is);
  ctx.lineTo(ix+ir2,iy+is);ctx.quadraticCurveTo(ix,iy+is,ix,iy+is-ir2);
  ctx.lineTo(ix,iy+ir2);ctx.quadraticCurveTo(ix,iy,ix+ir2,iy);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle="white"; ctx.font="bold 64px sans-serif"; ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.fillText("敬",w/2,iy+is/2+4);
  ctx.font="bold 72px sans-serif"; ctx.fillText("ケイゴマスター",w/2,330);
  ctx.font="32px sans-serif"; ctx.globalAlpha=0.9;
  ctx.fillText("新社会人のための敬語練習クイズ",w/2,400); ctx.globalAlpha=1;
  const tags=["尊敬語","謙譲語","丁寧語","ビジネスメール"];
  ctx.font="bold 24px sans-serif";
  const tw=160,th=44,tg=20,ttw=tags.length*tw+(tags.length-1)*tg;
  let tx=(w-ttw)/2;
  tags.forEach(t=>{
    ctx.fillStyle="rgba(255,255,255,0.2)";
    ctx.beginPath();ctx.roundRect(tx,470,tw,th,22);ctx.fill();
    ctx.fillStyle="white";ctx.fillText(t,tx+tw/2,470+th/2+1);
    tx+=tw+tg;
  });
  ctx.fillStyle="rgba(255,255,255,0.6)";ctx.font="20px sans-serif";
  ctx.fillText("全88問 ・ 3つの難易度 ・ 無料",w/2,570);
  dl("ogp.png");
  await new Promise(r=>setTimeout(r,500));

  // Splash
  const sw=1170,sh=2532;
  c.width=sw;c.height=sh;
  const sg=ctx.createLinearGradient(0,0,sw,sh);
  sg.addColorStop(0,"#6C63FF");sg.addColorStop(1,"#8B85FF");
  ctx.fillStyle=sg;ctx.fillRect(0,0,sw,sh);
  const ss=200,scx=sw/2,scy=sh/2-100;
  ctx.fillStyle="rgba(255,255,255,0.15)";
  const sir=ss*0.22,six=scx-ss/2,siy=scy-ss/2;
  ctx.beginPath();
  ctx.moveTo(six+sir,siy);ctx.lineTo(six+ss-sir,siy);ctx.quadraticCurveTo(six+ss,siy,six+ss,siy+sir);
  ctx.lineTo(six+ss,siy+ss-sir);ctx.quadraticCurveTo(six+ss,siy+ss,six+ss-sir,siy+ss);
  ctx.lineTo(six+sir,siy+ss);ctx.quadraticCurveTo(six,siy+ss,six,siy+ss-sir);
  ctx.lineTo(six,siy+sir);ctx.quadraticCurveTo(six,siy,six+sir,siy);
  ctx.closePath();ctx.fill();
  ctx.fillStyle="white";ctx.font="bold 110px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText("敬",scx,scy+5);
  ctx.font="bold 64px sans-serif";ctx.fillText("ケイゴマスター",scx,scy+180);
  ctx.globalAlpha=0.7;ctx.font="28px sans-serif";
  ctx.fillText("新社会人のための敬語練習クイズ",scx,scy+250);ctx.globalAlpha=1;
  dl("splash.png");

  document.title = "DONE";
}
run();
</script>
</body>
</html>
