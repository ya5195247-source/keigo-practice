      - script-src 'self' のみ。インラインスクリプト禁止（JSON-LDは非実行なので影響なし）

      - frame-src: AdSense導入時に変更が必要（下記参照）
      - 将来nonce/hashが必要になった場合はサーバーサイドで生成すること

      script-src: pagead2.googlesyndication.com adservice.google.com

      img-src:    pagead2.googlesyndication.com
    GA4導入時にCSPへ追加が必要なドメイン:
      script-src: www.googletagmanager.com
      connect-src: www.google-analytics.com analytics.google.com
    CSPもビルド時に環境変数で切り替えることを推奨。
  -->
